name: Tests
options:
  bundleIdPrefix: com.atastypixel
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  xcodeVersion: "16.0"

targets:
  TestsCLI:
    type: tool
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: CLI
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.atastypixel.TestsCLI
      SWIFT_VERSION: "5.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  
  Tests:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests
        excludes:
          - "**/Preview Content/**"
          - "Resources/ThirdPartyLicenses/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.atastypixel.Tests
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      CODE_SIGN_ENTITLEMENTS: Tests/Tests.entitlements
      ENABLE_HARDENED_RUNTIME: YES
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: "5.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    entitlements:
      path: Tests/Tests.entitlements
    info:
      path: Tests/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.developer-tools
    resources:
      - path: Tests/Assets.xcassets
      - path: Tests/Resources/post-commit
        buildPhase: resources
    dependencies:
      - target: TestsCLI
    postCompileScripts:
      - name: Copy CLI to App Bundle
        script: |
          if [ -d "${BUILT_PRODUCTS_DIR}/Tests.app" ] && [ -f "${BUILT_PRODUCTS_DIR}/TestsCLI" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS"
            cp "${BUILT_PRODUCTS_DIR}/TestsCLI" "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS/TestsCLI"
            chmod +x "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS/TestsCLI"
          fi
        inputFiles:
          - "${BUILT_PRODUCTS_DIR}/TestsCLI"
        outputFiles:
          - "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS/TestsCLI"
      - name: Copy post-commit hook to App Bundle
        script: |
          if [ -d "${BUILT_PRODUCTS_DIR}/Tests.app" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources"
            cp "${SRCROOT}/Tests/Resources/post-commit" "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/post-commit"
            chmod +x "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/post-commit"
          fi
        inputFiles:
          - "${SRCROOT}/Tests/Resources/post-commit"
        outputFiles:
          - "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/post-commit"
      - name: Copy Third-Party License Notices
        script: |
          if [ -d "${BUILT_PRODUCTS_DIR}/Tests.app" ] && [ -d "${SRCROOT}/Tests/Resources/ThirdPartyLicenses" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/ThirdPartyLicenses"
            cp "${SRCROOT}/Tests/Resources/ThirdPartyLicenses/"*.txt "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/ThirdPartyLicenses/"
          fi
        inputFiles:
          - "${SRCROOT}/Tests/Resources/ThirdPartyLicenses/xcbeautify-LICENSE.txt"
          - "${SRCROOT}/Tests/Resources/ThirdPartyLicenses/XMLCoder-LICENSE.txt"
          - "${SRCROOT}/Tests/Resources/ThirdPartyLicenses/swift-argument-parser-LICENSE.txt"
        outputFiles:
          - "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/ThirdPartyLicenses/xcbeautify-LICENSE.txt"
          - "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/ThirdPartyLicenses/XMLCoder-LICENSE.txt"
          - "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/ThirdPartyLicenses/swift-argument-parser-LICENSE.txt"
      - name: Build and Copy xcbeautify
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          XCBEAUTIFY_SOURCE="${SRCROOT}/Vendor/xcbeautify"
          XCBEAUTIFY_SCRATCH="${DERIVED_FILE_DIR}/xcbeautify-build"
          XCBEAUTIFY_OUTPUT="${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS/xcbeautify"

          if [ -d "${BUILT_PRODUCTS_DIR}/Tests.app" ] && [ -f "${XCBEAUTIFY_SOURCE}/Package.swift" ]; then
            xcrun swift build \
              --package-path "${XCBEAUTIFY_SOURCE}" \
              --configuration release \
              --product xcbeautify \
              --scratch-path "${XCBEAUTIFY_SCRATCH}"

            mkdir -p "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS"
            cp "${XCBEAUTIFY_SCRATCH}/release/xcbeautify" "${XCBEAUTIFY_OUTPUT}"
            chmod +x "${XCBEAUTIFY_OUTPUT}"
          fi
        outputFiles:
          - "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/MacOS/xcbeautify"
    postBuildScripts:
      - name: Clean up TestsCLI from Resources
        script: |
          # Remove TestsCLI from Resources (it should only be in MacOS)
          rm -f "${BUILT_PRODUCTS_DIR}/Tests.app/Contents/Resources/TestsCLI"

  TestsUnitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: TestsUnitTests
    dependencies:
      - target: Tests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.atastypixel.TestsUnitTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "5.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"

schemes:
  Tests:
    build:
      targets:
        Tests: all
        TestsCLI: all
    run:
      config: Debug
  TestsCLI:
    build:
      targets:
        TestsCLI: all
    run:
      config: Debug
  TestsUnitTests:
    build:
      targets:
        Tests: all
        TestsCLI: all
        TestsUnitTests: all
    test:
      targets:
        - TestsUnitTests
